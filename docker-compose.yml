services:
  web:
    build: .
    # SERVICE_FQDN_WEB_5000: Coolify magic var — generates a public domain
    # routed to this container's port 5000. Ignored by plain docker-compose.
    environment:
      - SERVICE_FQDN_WEB_5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=5000
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${SERVICE_PASSWORD_QDRANT:-}
    ports:
      - "5000:5000"
    volumes:
      - app_models:/app/models
      - app_product_images:/app/product_images
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    # SERVICE_PASSWORD_QDRANT: Coolify magic var — auto-generates and persists
    # a strong secret on first deploy; falls back to empty (auth disabled) for
    # plain `docker-compose up` so local dev keeps working without setup.
    environment:
      - QDRANT__SERVICE__API_KEY=${SERVICE_PASSWORD_QDRANT:-}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_storage:
  app_models:
  app_product_images:
